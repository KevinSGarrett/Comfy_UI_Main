name: Preflight and Package

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "Plan/**"
      - "Workflows/**"
      - "PromptProfiles/**"
      - "tools/**"
      - "PROJECT_ROOT_MANIFEST.json"
      - "README.md"
      - ".github/workflows/preflight-package.yml"

jobs:
  preflight-package:
    name: Local-only preflight and deploy bundle
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane_id: sdxl_low_risk_fallback_lane
            run_id: sdxl_low_risk_fallback_lane_hyperreal_editorial_portrait_v1
            prompt_profile: PromptProfiles\base_generation\hyperreal_editorial_portrait.json
            allow_non_first_lane: "false"
          - lane_id: sdxl_realvisxl_base_lane
            run_id: sdxl_realvisxl_base_lane_ci_preflight
            prompt_profile: ""
            allow_non_first_lane: "true"

    steps:
      - name: Checkout without LFS payloads
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Prepare artifact folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\ci_artifacts\model_registry" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\ci_artifacts\run_packages" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\ci_artifacts\deploy_bundle" | Out-Null

      - name: Sync exported workflow files
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\tools\Sync-WorkflowExports.ps1" -ProjectRoot "$env:GITHUB_WORKSPACE"

      - name: Model registry coverage gate
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\Plan\Instructions\QA\Scripts\Test-WorkflowModelRegistryCoverage.ps1" -ProjectRoot "$env:GITHUB_WORKSPACE" -OutFile "$env:GITHUB_WORKSPACE\ci_artifacts\model_registry\model_registry_coverage.json"

      - name: Build verified run package
        shell: pwsh
        run: |
          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "$env:GITHUB_WORKSPACE\tools\New-WorkflowRunPackage.ps1",
            "-ProjectRoot", "$env:GITHUB_WORKSPACE",
            "-LaneId", "${{ matrix.lane_id }}",
            "-RunId", "${{ matrix.run_id }}",
            "-PackageRoot", "$env:GITHUB_WORKSPACE\ci_artifacts\run_packages"
          )
          if ("${{ matrix.prompt_profile }}" -ne "") {
            $args += @("-PromptProfileFile", "${{ matrix.prompt_profile }}")
          }
          if ("${{ matrix.allow_non_first_lane }}" -eq "true") {
            $args += "-AllowNonFirstLane"
          }
          & powershell @args

      - name: Build deploy bundle
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\tools\New-EC2DeployBundle.ps1" -ProjectRoot "$env:GITHUB_WORKSPACE" -LaneId "${{ matrix.lane_id }}" -RunPackageManifestFile "$env:GITHUB_WORKSPACE\ci_artifacts\run_packages\${{ matrix.run_id }}\RUN_PACKAGE_MANIFEST.json" -OutDir "$env:GITHUB_WORKSPACE\ci_artifacts\deploy_bundle\${{ matrix.run_id }}" -BundleName "${{ matrix.run_id }}"

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: comfy-ui-main-preflight-deploy-bundle-${{ matrix.run_id }}
          path: |
            ci_artifacts/deploy_bundle/**/*.zip
            ci_artifacts/deploy_bundle/**/DEPLOY_BUNDLE_MANIFEST.json
            ci_artifacts/model_registry/model_registry_coverage.json
          retention-days: 7

      - name: Configure AWS credentials for optional S3 deploy bundle upload
        if: ${{ github.event_name != 'pull_request' && vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_REGION != '' && vars.COMFY_DEPLOY_BUNDLE_S3_URI != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload deploy bundle to S3
        if: ${{ github.event_name != 'pull_request' && vars.AWS_ROLE_TO_ASSUME != '' && vars.AWS_REGION != '' && vars.COMFY_DEPLOY_BUNDLE_S3_URI != '' }}
        shell: pwsh
        run: |
          $manifestPath = "$env:GITHUB_WORKSPACE\ci_artifacts\deploy_bundle\${{ matrix.run_id }}\DEPLOY_BUNDLE_MANIFEST.json"
          $manifest = Get-Content -Raw -LiteralPath $manifestPath | ConvertFrom-Json
          $bundlePath = Join-Path (Split-Path -Parent $manifestPath) ([string]$manifest.bundle_zip)
          $targetBase = "${{ vars.COMFY_DEPLOY_BUNDLE_S3_URI }}".TrimEnd("/")
          $targetPrefix = "$targetBase/${{ matrix.run_id }}/${{ github.sha }}"
          aws s3 cp $bundlePath "$targetPrefix/$($manifest.bundle_zip)" --only-show-errors
          aws s3 cp $manifestPath "$targetPrefix/DEPLOY_BUNDLE_MANIFEST.json" --only-show-errors
          "### Deploy bundle S3 output" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Lane: ${{ matrix.lane_id }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Run ID: ${{ matrix.run_id }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Bundle: ``$targetPrefix/$($manifest.bundle_zip)``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- SHA256: ``$($manifest.bundle_zip_sha256)``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
