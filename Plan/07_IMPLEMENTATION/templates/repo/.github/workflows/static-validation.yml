name: static-validation

on:
  push:
  pull_request:

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check JSON parse
        run: |
          python - <<'PY'
          import json, pathlib, sys
          bad=[]
          for p in pathlib.Path('.').rglob('*.json'):
              try:
                  json.loads(p.read_text(encoding='utf-8'))
              except Exception as e:
                  bad.append((str(p), str(e)))
          if bad:
              for p,e in bad:
                  print('BAD_JSON', p, e)
              sys.exit(1)
          print('JSON parse OK')
          PY
      - name: Check forbidden model/media files
        run: |
          python scripts/python/check_no_model_files_in_git.py --root .
      - name: Compile Python
        run: |
          python -m compileall scripts orchestration || true
